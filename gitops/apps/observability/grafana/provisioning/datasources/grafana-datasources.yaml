apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  
data:
  datasource.yaml: |
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
    prune: true
    datasources:
      - name: Prometheus
        orgId: 1
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.observability.svc.cluster.local:9090
        isDefault: true
        version: 2
        editable: false
      - name: Loki
        orgId: 1
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        version: 1
        editable: false
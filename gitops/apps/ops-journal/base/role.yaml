apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ops-journal-reality-reader
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch

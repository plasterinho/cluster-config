apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-journal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ops-journal
  template:
    metadata:
      labels:
        app: ops-journal
    spec:
      containers:
        - name: ops-journal
          image: ghcr.io/plasterinho/ops-journal
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.1.0
          args:
            - "-nginx.scrape-uri=http://localhost/nginx_status"
          ports:
            - containerPort: 9113
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
        - name: metrics
          image: ghcr.io/plasterinho/ops-journal-metrics
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
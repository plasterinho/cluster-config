apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-journal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ops-journal
  template:
    metadata:
      labels:
        app: ops-journal
    spec:
      containers:
        - name: ops-journal
          image: ghcr.io/plasterinho/ops-journal
          imagePullPolicy: Always
          ports:
            - containerPort: 80
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.1.0
          args:
            - "-nginx.scrape-uri=http://localhost/nginx_status"
          ports:
            - containerPort: 9113

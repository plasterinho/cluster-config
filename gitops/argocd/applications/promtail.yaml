apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: 6.17.1
    helm:
      values: |
        image:
          tag: 2.8.0

        config:
          clients:
            - url: http://loki:3100/loki/api/v1/push
          snippets:
            extraRelabelConfigs:
              - action: keep
                source_labels:
                  - __meta_kubernetes_namespace
                regex: ops-journal.*

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

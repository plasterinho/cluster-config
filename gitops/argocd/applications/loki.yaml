apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/plasterinho/cluster-config 
    targetRevision: HEAD
    path: gitops/apps/observability/loki
  destination:
    server: https://kubernetes.default.svc
    namespace: observability